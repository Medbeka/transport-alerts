<!DOCTYPE html>
<html>
<head>
    <title>Public Transport Disruption Alerting System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: white;
            color: black;
            padding: 20px;
        }

        .container{
            max-width: 900px;
            margin: auto;
        }

        h1{
            margin-bottom: 20px;
        }

        h2{
            margin-top: 30px;
            margin-bottom: 10px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button{
            padding: 10px 20px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        pre{
            border: 1px solid #ccc;
            padding: 10px;
            background: #f5f5f5;
            white-space: pre-wrap;
            min-height: 120px;
        }

        .section{
            margin-bottom: 30px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Public Transport Disruption Alerting System</h1>

    <div class="section">

        <h2>Subscribe to Route</h2>

        <input
            id="email"
            placeholder="Email">

        <input
            id="route"
            placeholder="Route Number">

        <button onclick="subscribe()">
            Subscribe
        </button>

    </div>

    <div class="section">

        <h2>Current Disruptions</h2>

        <button onclick="loadDisruptions()">
            Load Disruptions
        </button>

        <pre id="disruptions">
No disruptions loaded.
        </pre>

    </div>

    <div class="section">

        <h2>Matched Alerts</h2>

        <button onclick="loadAlerts()">
            Load Alerts
        </button>

        <pre id="alerts">
No alerts loaded.
        </pre>

    </div>

</div>

<script>

async function subscribe(){

    await fetch('/api/subscription',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            email:document.getElementById('email').value,
            routeId:document.getElementById('route').value
        })
    });

    alert('Subscription Added');
}

async function loadAlerts(){

    const response =
        await fetch('/api/subscription/alerts');

    const data =
        await response.json();

    let output = '';

    data.forEach(alert => {

        output +=
`Route: ${alert.route}

Message: ${alert.message}

Subscriber: ${alert.email}

-------------------------

`;
    });

    document.getElementById('alerts').innerText =
        output || 'No alerts found';
}

async function loadDisruptions(){

    const response =
        await fetch('/api/disruption');

    const data =
        await response.json();

    let output = '';

    data.forEach(d => {

        output +=
`Route: ${d.routeId}

Message: ${d.message}

Created: ${d.createdAt}

-------------------------

`;
    });

    document.getElementById('disruptions').innerText =
        output || 'No disruptions found';
}

</script>

</body>
</html>
